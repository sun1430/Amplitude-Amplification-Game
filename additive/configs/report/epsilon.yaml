experiment:
  name: epsilon_analysis_report
  output_root: additive/results/report/epsilon
  seed: 107
  num_profiles: 16
  best_response_candidates: 8
  train_samples: 256
  val_samples: 64
  batch_size: 32
  epochs: 50
  learning_rate: 0.005
  weight_decay: 0.0001
  early_stopping_patience: 8
  hidden_dim: 64
  max_regret_candidates: 8
model:
  num_agents: 2
  state_dim: 2
  mixing_depth: 2
  action_budget: 2.5
  lambdas: 0.05
  mixer_seed: 43
  device: cuda
target:
  seed: 23
  conflict_level: medium
equilibrium:
  discrete_phases: [0.0, 1.5707963267948966, 3.141592653589793]
  epsilon: 0.1
  max_profiles: 128
scenarios:
  - name: shallow_low_conflict
    model:
      mixing_depth: 1
    target:
      conflict_level: low
  - name: medium_conflict
    model:
      mixing_depth: 2
    target:
      conflict_level: medium
  - name: deep_high_conflict
    model:
      mixing_depth: 3
    target:
      conflict_level: high
