experiment:
  name: activation_ablation_quick
  output_root: additive/results/quick/activation_ablation
  seed: 151
  num_profiles: 8
  best_response_candidates: 6
  train_samples: 64
  val_samples: 16
  batch_size: 16
  epochs: 24
  learning_rate: 0.005
  weight_decay: 0.0001
  early_stopping_patience: 5
  hidden_dim: 48
  max_regret_candidates: 6
model:
  num_agents: 2
  state_dim: 3
  mixing_depth: 2
  action_budget: 3.0
  lambdas: 0.06
  mixer_seed: 59
  device: cuda
target:
  seed: 37
  conflict_level: medium
equilibrium:
  discrete_phases: [0.0, 1.5707963267948966]
  epsilon: 0.1
  max_profiles: 64
activation_ablations:
  - name: entmax_1p5
    model:
      activation_family: entmax
      activation_alpha: 1.5
  - name: sparsemax
    model:
      activation_family: sparsemax
scenarios:
  - name: shallow_low_conflict
    model:
      mixing_depth: 1
    target:
      conflict_level: low
  - name: deep_high_conflict
    model:
      mixing_depth: 3
    target:
      conflict_level: high
