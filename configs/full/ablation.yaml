experiment:
  name: ablation_full
  output_root: results/full/ablation
  seed: 113
  num_profiles: 30
  sampling_draws: 1024
model:
  num_agents: 3
  state_dim: 8
  mixing_depth: 2
  action_budget: 6.0
  lambdas: 0.06
  mixer_seed: 89
target:
  seed: 45
  conflict_level: medium
dynamics:
  num_initializations: 4
  max_steps: 24
  step_size: 0.08
  br_inner_steps: 14
scenarios:
  - name: A_no_mixing
    model:
      mixing_depth: 0
  - name: B_with_mixing
    model:
      mixing_depth: 2
  - name: C_shared_payoff
    target:
      shared_target: true
    model:
      use_competitive_extension: false
      gammas: 0.0
  - name: D_low_conflict
    target:
      conflict_level: low
  - name: E_high_conflict
    target:
      conflict_level: high
  - name: F_high_conflict_competitive
    target:
      conflict_level: high
    model:
      use_competitive_extension: true
      gammas: 0.10
