target:
  seed: 13
  conflict_level: medium
equilibrium:
  discrete_phases: [0.0, 1.5707963267948966]
  epsilon: 0.1
  max_profiles: 128
scenarios:
  - name: medium_conflict
    target:
      conflict_level: medium
  - name: high_conflict
    target:
      conflict_level: high
